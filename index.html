function atC(bu){const m=S.cfg[bu].meta,tp=m.emp.p+m.bu.p+m.ar.p;return tp?(m.emp.p*m.emp.a+m.bu.p*m.bu.a+m.ar.p*m.ar.a)/tp:0;}
function det(sc){return sc>3.5?0:sc>=3?.1:.2}
function bonAt(e,at){const c=S.cfg[e.bu];if(at<c.piso)return 0;const cap=Math.min(at,c.teto);let b=e.sal*(e.mult||2)*(cap/100);if(c.d360.on)b*=(1-det(c.d360.sc));return b;}
function bon(e){return bonAt(e,atC(e.bu));}
function poolBu(bu,at){return S.employees.filter(e=>e.bu===bu).reduce((s,e)=>s+bonAt(e,at!==undefined?at:atC(bu)),0);}

        <tr class="tr-tot"><td>GRUPO</td><td class="num">${S.employees.length}</td>

async function importJSON(file){
  const txt = await file.text();
  try{
    const d = JSON.parse(txt);
    if(d.employees) S.employees = d.employees;
    if(d.multCfg)   S.multCfg   = d.multCfg;
    if(d.cfg)       S.cfg       = d.cfg;
    if(d.old)       S.old       = d.old;
    if(d.nid)       S.nid       = d.nid;
    await saveState(true);
    render();
  }catch(e){ alert('Arquivo inválido.'); }
}

function bindEvt(){
  document.querySelectorAll('.tb').forEach(b=>b.addEventListener('click',()=>{S.tab=b.dataset.tab;// Inicializa: tenta carregar estado salvo, senão usa defaults
loadState().then(()=>{ applyAll(); render(); });}));
  document.querySelectorAll('.ei').forEach(inp=>inp.addEventListener('change',()=>{
    const id=+inp.dataset.id,f=inp.dataset.f,e=S.employees.find(x=>x.id===id);
    if(e){
      e[f]=(f==='sal'||f==='mult')?+inp.value:inp.value;
      if(['cg','ta','bu'].includes(f)){const m=S.multCfg[e.bu]?.[e.cg];if(m)e.mult=(e.ta==='Fim'?m.F:m.M);}
    }
    document.getElementById('hdr-info').textContent=`${S.employees.length} elegíveis · Pool: ${R(poolAll())}`;
    saveState(false); // salva a cada mudança de input
    if(S.tab!=='pl')render();
  }));
  document.querySelectorAll('.dx').forEach(b=>b.addEventListener('click',()=>{S.employees=S.employees.filter(e=>e.id!==+b.dataset.id);render();}));
  document.querySelectorAll('.tbl th[data-sort]').forEach(th=>th.addEventListener('click',()=>{
    const k=th.dataset.sort;srt.col===k?srt.dir*=-1:(srt.col=k,srt.dir=1);render();

  const ae=document.getElementById('add-e');

    e.mult=S.multCfg['H2Bet']['Gerente']?.F||2;S.employees.push(e);render();
  });
  const csvf=document.getElementById('csvf');
  if(csvf)csvf.addEventListener('change',ev=>{
    const f=ev.target.files[0];if(!f)return;
    const r=new FileReader();r.onload=e=>parseCSV(e.target.result);r.readAsText(f,'UTF-8');
  });
}

function parseCSV(txt){
  const lines=txt.trim().split('\n');if(lines.length<2)return;
  const sep=lines[0].includes('\t')?'\t':',';
  const hdrs=lines[0].split(sep).map(h=>h.trim().toLowerCase().replace(/['"]/g,''));
  const fm={nome:'n',name:'n','área':'ar',area:'ar',cargo:'cg',tipo:'ta',tipoarea:'ta','salário':'sal',salario:'sal',salary:'sal',multiplicador:'mult',mult:'mult',bu:'bu'};
  const ne=[];
  for(let i=1;i<lines.length;i++){
    const vs=lines[i].split(sep).map(v=>v.trim().replace(/^["']|["']$/g,''));
    if(vs.length<2||!vs[0])continue;
    const em={id:S.nid++,n:'',bu:'H2Bet',ar:'',cg:'Gerente',ta:'Fim',sal:10000,mult:2};
    hdrs.forEach((h,j)=>{const ff=fm[h];if(ff&&vs[j]!==undefined){if(ff==='sal'||ff==='mult')em[ff]=parseFloat(vs[j].replace(/[R$\s.]/g,'').replace(',','.'))||em[ff];else em[ff]=vs[j];}});
    const m=S.multCfg[em.bu]?.[em.cg];if(m)em.mult=(em.ta==='Fim'?m.F:m.M);
    if(em.n)ne.push(em);
  }
  if(ne.length){S.employees=ne;render();}
}

loadState().then(()=>{ applyAll(); render(); });
